name: Gyre Release

# Trigger on tags matching v* (e.g. v1.0.0, v0.2.3-beta)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # Build macOS binaries natively (arm64 + x86_64)
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14          # Apple Silicon runner
          - target: x86_64-apple-darwin
            runner: macos-15-intel    # Intel runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary (release)
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features libsql

      - name: Package binary
        run: |
          BINARY=target/${{ matrix.target }}/release/gyre
          ARCHIVE=gyre-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          cat "$ARCHIVE.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 7

  # ──────────────────────────────────────────────
  # Build Linux binaries via `cross`
  # ──────────────────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm   # Native ARM runner (faster than cross-compile)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation fallback)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && runner.arch == 'X64'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Install system dependencies (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Build binary (native cargo)
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features libsql

      - name: Package binary
        run: |
          BINARY=target/${{ matrix.target }}/release/gyre
          ARCHIVE=gyre-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksum
        run: |
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          cat "$ARCHIVE.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 7

  # ──────────────────────────────────────────────
  # Publish GitHub Release with all assets
  # ──────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-22.04
    if: always() && !cancelled() && (needs.build-macos.result == 'success' || needs.build-linux.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Generate combined checksums file
        run: |
          cd artifacts
          # Combine all individual .sha256 files into one manifest
          cat *.sha256 > checksums-sha256.txt
          echo ""
          echo "=== SHA256 Checksums ==="
          cat checksums-sha256.txt

      - name: Determine release type
        id: release_type
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '(alpha|beta|rc|pre)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        id: version
        run: |
          # Strip leading 'v' for display
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.release_type.outputs.prerelease }}"
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          NOTES="## Gyre ${TAG}

          ### Installation

          \`\`\`bash
          # macOS/Linux (recommended)
          curl -fsSL https://raw.githubusercontent.com/sac916/gyre/main/install.sh | sh

          # Homebrew (macOS)
          brew tap sac916/gyre
          brew install gyre
          \`\`\`

          ### Direct Download

          | Platform | Architecture | Download |
          |----------|-------------|---------|
          | macOS | Apple Silicon (arm64) | [gyre-${TAG}-aarch64-apple-darwin.tar.gz](https://github.com/sac916/gyre/releases/download/${TAG}/gyre-${TAG}-aarch64-apple-darwin.tar.gz) |
          | macOS | Intel (x86_64) | [gyre-${TAG}-x86_64-apple-darwin.tar.gz](https://github.com/sac916/gyre/releases/download/${TAG}/gyre-${TAG}-x86_64-apple-darwin.tar.gz) |
          | Linux | x86_64 | [gyre-${TAG}-x86_64-unknown-linux-gnu.tar.gz](https://github.com/sac916/gyre/releases/download/${TAG}/gyre-${TAG}-x86_64-unknown-linux-gnu.tar.gz) |
          | Linux | ARM64 | [gyre-${TAG}-aarch64-unknown-linux-gnu.tar.gz](https://github.com/sac916/gyre/releases/download/${TAG}/gyre-${TAG}-aarch64-unknown-linux-gnu.tar.gz) |

          ### Verify

          \`\`\`bash
          sha256sum -c checksums-sha256.txt
          \`\`\`

          ### What's Next

          \`\`\`bash
          gyre init
          \`\`\`"

          # Write notes to temp file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md

          gh release create "$TAG" \
            --title "Gyre ${TAG}" \
            --notes-file /tmp/release_notes.md \
            $PRERELEASE_FLAG \
            --target "${{ github.sha }}" \
            artifacts/*.tar.gz \
            artifacts/*.sha256 \
            artifacts/checksums-sha256.txt
